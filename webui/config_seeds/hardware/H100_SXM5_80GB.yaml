sw_param:
  full_recomputation: true
  kernel_launch_overhead: 6e-6
  dp_zero_stage: 1
  precision:
    tensor_format: bf16
    kv_cache: bf16
    parameters: bf16
    gradients: bf16
    grad_microbatch: bf16
    grad_communication: bf16
    optimizer_states: bf16
    stats: bf16
    master_parameters: 0.0
  h2d_bandwidth: -1
  dp_microbatch: last_mb
tech_param:
  core:
    operating_frequency: 1.98e9
    num_bundles: 132
    nominal_flop_rate_per_mcu: 1024
    nominal_energy_per_flop: 1.8e-13
    num_mcu_per_bundle: 4
    FMA_d1: 16
    FMA_d2: 8
    dataflow: best
    util: 0.56
  DRAM:
    size: 80 GB
    bandwidth: 3.43e12
    dynamic_energy_per_bit: 4.5e-12
    latency: 100e-9
    util: 0.8
  SRAM-L2:
    size: 50 MB
    bandwidth: 8138 GB
    dynamic_energy_per_bit: 130e-15
    latency: 0
    util: 1
  SRAM-L1:
    size: 30096 KB
    bandwidth: 22392 GB
    dynamic_energy_per_bit: 130e-15
    latency: 0
    util: 1
  SRAM-R:
    size: 33 MB
    bandwidth: 122 TB
    dynamic_energy_per_bit: 110e-15
    latency: 0
    util: 1
memory_hierarchy:
  l0:
    type: SRAM-R
    scope: mcu
  l1:
    type: SRAM-L1
    scope: mcu-bundle
  l2:
    type: SRAM-L2
    scope: global
  l3:
    type: DRAM
    scope: global
parallelism:
  auto: false
  tp: 4
  tp_sp: true
  cp: 1
  pp: 1
  mb: 1
  train:
    dp: 2
    ep: 1
    tp_ep: true
  inference:
    replica_count: 2
    moe_dp: 1
network:
  dimensions:
  - id: dim0
    label: intra_node_gpu_fabric
    size: auto
    topology:
      type: Ring
      bandwidth: 100 GB
      latency: 5e-6
      energy_per_bit: 8e-12
      util: 0.85
      optimize_2dmap: false
    collective_override: {}
    parallelisms:
    - tp
    - cp
    - ep
  - id: dim1
    label: inter_node_pipeline_data_parallel
    size: auto
    topology:
      type: Ring
      bandwidth: 25 GB
      latency: 5e-6
      energy_per_bit: 8e-12
      util: 0.85
    collective_override: {}
    parallelisms:
    - pp
    - dp
  - id: dim2
    label: reserved_data_parallel_axis
    size: auto
    topology:
      type: Ring
      bandwidth: 25 GB
      latency: 5e-6
      energy_per_bit: 8e-12
      util: 0.85
    collective_override: {}
    parallelisms: []
  overlap:
    tp_sp_overlap: 0.63
    tp_overlap: 0.6
    cp_overlap: 0.0
execution_backend:
  model: analytical
  astra:
    backend: astra
    mode: full_astrasim_hierarchical
    collectives:
      all_gather: auto
      all_reduce: auto
      reduce_scatter: auto
      all_to_all: auto
    sys_options:
      endpoint_delay: 5
      active_chunks_per_dimension: 32
      preferred_dataset_splits: 4
inference:
  kvcache_type: hbm_only
metadata:
  display_name: NVIDIA H100 SXM5 80GB
  source_config: validation_scripts/validation_configs/hardware-config/H100_SXM5_80GB_base.yaml
  derates:
    compute: 0.56
    memory: 0.8
    communication: 0.85
