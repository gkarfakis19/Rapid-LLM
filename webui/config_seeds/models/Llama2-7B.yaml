  run_type: training
  tied_embeddings: true
  model_type: llama
  global_batch_size: 128
  gradient_accumulation_steps: 1
  seq_len: 2048
  hidden_dim: 4096
  attention:
    attention_type: mha
    num_heads: 32
    kv_heads: null
    use_flashattention: true
    attention_tile_size: 128
