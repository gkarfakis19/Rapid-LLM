    num_experts: 1
    top_k: 1
    moe_intermediate_size: 11008
    n_shared_experts: 0
    moe_layer_freq: 1
    first_k_dense_replace: 32
  intermediate_size: 11008
  vocab_size: 32000
  num_layers: 32
  decode_len: 0
metadata:
  source_config: validation_scripts/validation_configs/model-config/Llama2-7B.yaml
